<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Site | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="index.html">Test Site</a>
            <div class="nav-links">
                <a class="active" href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main class="page">
        <section class="hero">
            <p class="eyebrow">Simple static test</p>
            <h1>Three pages, clean navigation.</h1>
            <p>This lightweight site is ready for quick browser testing, routing checks, and deployment smoke tests.</p>

            <div class="countdown mt-4" aria-live="polite">
                <p class="countdown-label mb-3">Countdown to New Year</p>
                <div class="row g-3" id="countdown" role="timer">
                    <div class="col-6 col-md-3">
                        <div class="card border-0 shadow-sm countdown-item h-100">
                            <div class="card-body text-center py-3">
                                <p class="display-5 fw-bold mb-1 text-success-emphasis" id="days">0</p>
                                <small class="text-uppercase text-secondary fw-semibold">Days</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card border-0 shadow-sm countdown-item h-100">
                            <div class="card-body text-center py-3">
                                <p class="display-5 fw-bold mb-1 text-success-emphasis" id="hours">0</p>
                                <small class="text-uppercase text-secondary fw-semibold">Hours</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card border-0 shadow-sm countdown-item h-100">
                            <div class="card-body text-center py-3">
                                <p class="display-5 fw-bold mb-1 text-success-emphasis" id="minutes">0</p>
                                <small class="text-uppercase text-secondary fw-semibold">Minutes</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card border-0 shadow-sm countdown-item h-100">
                            <div class="card-body text-center py-3">
                                <p class="display-5 fw-bold mb-1 text-success-emphasis" id="seconds">0</p>
                                <small class="text-uppercase text-secondary fw-semibold">Seconds</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <a class="button" href="about.html">View About Page</a>
        </section>
    </main>

    <script>
        const now = new Date();
        const target = new Date(now.getFullYear() + 1, 0, 1, 0, 0, 0);

        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const countdownEl = document.getElementById('countdown');

        function updateCountdown() {
            const current = new Date();
            const diff = target - current;

            if (diff <= 0) {
                daysEl.textContent = '0';
                hoursEl.textContent = '0';
                minutesEl.textContent = '0';
                secondsEl.textContent = '0';
                countdownEl.setAttribute('aria-label', 'Countdown complete');
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            daysEl.textContent = String(days);
            hoursEl.textContent = String(hours).padStart(2, '0');
            minutesEl.textContent = String(minutes).padStart(2, '0');
            secondsEl.textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
