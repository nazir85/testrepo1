<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Site | Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="index.html">Test Site</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a class="active" href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main class="page">
        <section class="panel">
            <p class="eyebrow">Contact Us</p>
            <h1>Send us a message.</h1>
            <p>This static form is for layout and navigation testing. It does not submit to a backend yet.</p>

            <form class="contact-form" action="#" method="post">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name" required>
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>
                </div>

                <div class="form-row">
                    <label for="subject">Subject</label>
                    <input id="subject" name="subject" type="text" placeholder="How can we help?" required>
                </div>

                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
                </div>

                <div class="form-actions">
                    <button class="button" type="submit">Send Message</button>
                    <a class="button secondary" href="index.html">Back Home</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
